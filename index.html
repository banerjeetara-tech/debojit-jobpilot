<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobPilot - Debojit</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #B8D4C8, #8EB6A6); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .header h1 { margin: 0; font-size: 24px; }
    .header p { margin: 5px 0 0 0; opacity: 0.9; }
    button { background: #8B4E68; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px 0; }
    button:hover { background: #6B3E58; }
    .job { background: white; padding: 15px; margin: 10px 0; border-left: 4px solid #0066CC; border-radius: 4px; }
    .job h3 { margin: 0 0 8px 0; color: #0066CC; }
    .job p { margin: 5px 0; color: #666; font-size: 14px; }
    .empty { color: #999; padding: 20px; text-align: center; }
    .loading { color: #0066CC; }
    .error { color: red; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 JobPilot</h1>
      <p>Debojit · Recovery Manager Desk</p>
    </div>

    <button onclick="refreshJobs()">🔄 Refresh Jobs</button>

    <div id="jobs-container">
      <div class="empty loading">Loading jobs...</div>
    </div>
  </div>

  <script>
    const BIN_ID = "6a2a8a2cda38895dfeac7eca";
    const KEY = "$2a$10$S1Jd3D0tBhLZ5C8s.0Ef5vCebuGczTs9Fw";

    async function refreshJobs() {
      const container = document.getElementById("jobs-container");
      container.innerHTML = '<div class="empty loading">Loading...</div>';

      try {
        console.log("🔄 Fetching from JSONBin...");
        const url = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest?meta=false&t=${Date.now()}`;
        
        const response = await fetch(url, {
          headers: { "X-Master-Key": KEY },
          cache: "no-store"
        });

        console.log("📊 Response status:", response.status);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        console.log("✅ Data from JSONBin:", data);

        if (!data.jobs || data.jobs.length === 0) {
          container.innerHTML = '<div class="empty">No jobs found in JSONBin</div>';
          console.log("⚠️ No jobs in JSONBin");
          return;
        }

        console.log(`✅ Found ${data.jobs.length} jobs`);

        let html = "";
        data.jobs.forEach(job => {
          html += `
            <div class="job">
              <h3>${job.title || "No Title"}</h3>
              <p><strong>Company:</strong> ${job.company || "N/A"}</p>
              <p><strong>Location:</strong> ${job.location || "N/A"}</p>
              <p><strong>Source:</strong> ${job.source || "Unknown"}</p>
              <p><strong>Score:</strong> ${job.score || 0}/100</p>
              <p><a href="${job.url || '#'}" target="_blank">View Job →</a></p>
            </div>
          `;
        });

        container.innerHTML = html;
        console.log("✅ Jobs rendered");

      } catch (error) {
        console.error("❌ Error:", error);
        container.innerHTML = `<div class="empty error">❌ Error: ${error.message}</div>`;
      }
    }

    // Load on page load
    window.addEventListener("load", refreshJobs);

    // Refresh every 5 minutes
    setInterval(refreshJobs, 5 * 60 * 1000);
  </script>
</body>
</html>
