<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>JobPilot - Debojit Recovery Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:#F8F1F4;
      --card:#FFFDFB;
      --ink:#2B2528;
      --muted:#776B72;
      --line:#EADFE4;
      --accent:#8B4E68;
      --accent-2:#C77993;
      --accent-soft:#F5E7EE;
      --blue:#7B3F5D;
      --red:#B54A54;
      --red-soft:#F8E3E8;
      --amber:#A76B2A;
      --amber-soft:#F8ECD8;
      --green:#6E8B4E;
      --green-soft:#EEF4E4;
      --shadow:0 8px 24px rgba(95,55,75,.07);
    }

    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      margin:0;
      min-height:100%;
      background:var(--paper);
      color:var(--ink);
      font-family:"Hanken Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding-bottom:82px;
    }

    button, input, textarea, select {
      font-family:inherit;
    }

    .font-display {
      font-family:"Fraunces", Georgia, serif;
    }

    .shell {
      max-width:700px;
      margin:0 auto;
      min-height:100vh;
    }

    .hero {
      background:linear-gradient(135deg, #B8D4C8 0%, #8EB6A6 100%);
      color:white;
      padding:42px 20px 22px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
    }

    .hero-title {
      font-family:"Fraunces", Georgia, serif;
      font-size:20px;
      line-height:1;
      margin:0 0 8px;
      font-weight:600;
      letter-spacing:.2px;
    }

    .hero-sub {
      margin:0;
      opacity:.92;
      font-size:11.5px;
      letter-spacing:.2px;
    }

    .progress-box {
      text-align:center;
      min-width:68px;
    }

    .progress-number {
      font-size:20px;
      line-height:1;
      font-weight:700;
    }

    .progress-label {
      font-size:10px;
      letter-spacing:1.8px;
      margin-top:8px;
      opacity:.9;
    }

    .toolbar {
      padding:14px 18px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .refresh-btn {
      border:0;
      border-radius:999px;
      background:var(--accent-soft);
      color:#8B4E68;
      padding:10px 14px;
      font-weight:800;
      font-size:14px;
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
    }

    .count-text {
      color:var(--muted);
      font-size:11.5px;
      font-weight:700;
    }

    .content {
      padding:0 14px 12px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:15px;
      overflow:hidden;
      box-shadow:var(--shadow);
      margin-bottom:10px;
    }

    .card.high {
      border-left:5px solid var(--accent-2);
    }

    .card.medium {
      border-left:5px solid #D6A152;
    }

    .card.low {
      border-left:5px solid #B7B0A3;
    }

    .card-head {
      width:100%;
      border:0;
      background:transparent;
      text-align:left;
      padding:13px 14px;
      display:grid;
      grid-template-columns:44px 1fr 20px;
      gap:12px;
      cursor:pointer;
    }

    .job-icon {
      width:44px;
      height:44px;
      border-radius:14px;
      background:var(--accent-soft);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      color:var(--accent);
    }

    .job-title {
      color:var(--blue);
      font-size:14px;
      font-weight:800;
      line-height:1.25;
      margin-bottom:2px;
    }

    .job-company {
      color:var(--muted);
      font-size:12px;
      line-height:1.3;
      margin-bottom:2px;
    }

    .job-location {
      color:var(--muted);
      font-size:12px;
      line-height:1.3;
    }

    .chip-row {
      margin-top:8px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip {
      display:inline-flex;
      align-items:center;
      gap:5px;
      border-radius:999px;
      padding:5px 9px;
      font-size:11.5px;
      font-weight:800;
      line-height:1;
      white-space:nowrap;
    }

    .chip-status {
      background:var(--amber-soft);
      color:#9A6A3B;
    }

    .chip-high {
      background:var(--green-soft);
      color:var(--green);
    }

    .chip-medium {
      background:var(--amber-soft);
      color:var(--amber);
    }

    .chip-low {
      background:#EFEBE3;
      color:var(--muted);
    }

    .job-date {
      color:#8C877D;
      font-size:11.5px;
      margin-top:8px;
    }

    .chevron {
      color:var(--blue);
      font-size:20px;
      line-height:1;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      font-weight:800;
    }

    .card-body {
      border-top:1px solid var(--line);
      padding:14px 14px 16px;
    }

    .quote {
      color:#7F7A71;
      font-size:14px;
      font-style:italic;
      line-height:1.45;
      margin:0 0 16px;
    }

    .label {
      font-size:12px;
      color:#7C766C;
      font-weight:900;
      letter-spacing:.7px;
      margin:0 0 8px;
      text-transform:uppercase;
    }

    .status-select {
      width:100%;
      background:var(--card);
      color:var(--ink);
      border:1px solid var(--line);
      border-radius:15px;
      padding:11px 13px;
      font-size:14px;
      outline:0;
      margin-bottom:12px;
    }

    .actions {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:12px;
    }

    .action {
      border:1px solid var(--line);
      background:var(--card);
      color:var(--ink);
      border-radius:14px;
      padding:11px 10px;
      font-weight:900;
      font-size:11.5px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      cursor:pointer;
    }

    .hint {
      color:#8B867B;
      font-size:12.5px;
      line-height:1.35;
      margin:0 0 16px;
    }

    .description {
      display:none;
      background:#FBF8F1;
      border:1px solid var(--line);
      border-radius:14px;
      padding:9px 11px;
      margin-bottom:12px;
      color:#6F6B61;
      line-height:1.45;
      font-size:12.5px;
      white-space:pre-wrap;
    }

    .description.open {
      display:block;
    }

    .link-btn {
      border:0;
      background:transparent;
      color:#8B4E68;
      font-weight:900;
      font-size:12.5px;
      display:block;
      margin:2px auto 18px;
      cursor:pointer;
    }

    .notes {
      width:100%;
      min-height:52px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#FFFDF8;
      padding:9px 11px;
      resize:vertical;
      outline:none;
      font-size:12.5px;
      color:var(--ink);
    }

    .remove-btn {
      margin-top:10px;
      border:0;
      background:transparent;
      color:var(--red);
      font-weight:900;
      font-size:11.5px;
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
    }

    .empty {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:15px;
      padding:34px 22px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .tabs {
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#FFFDF8;
      border-top:1px solid var(--line);
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      max-width:700px;
      margin:0 auto;
      height:72px;
      z-index:20;
    }

    .tab {
      border:0;
      background:transparent;
      color:#8B867B;
      font-weight:800;
      font-size:11.5px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      cursor:pointer;
    }

    .tab.active {
      color:#8B4E68;
    }

    .tab-icon {
      font-size:18px;
      line-height:1;
    }

    .page-title {
      font-family:"Fraunces", Georgia, serif;
      font-size:22px;
      margin:8px 4px 16px;
    }

    .form-card, .tracker-card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:15px;
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:10px;
    }

    .field {
      margin-bottom:10px;
    }

    .field label {
      display:block;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      margin-bottom:6px;
      letter-spacing:.4px;
    }

    .field input, .field textarea {
      width:100%;
      border:1px solid var(--line);
      background:#FFFDF8;
      color:var(--ink);
      border-radius:14px;
      padding:10px 12px;
      outline:0;
      font-size:11.5px;
    }

    .save-btn {
      width:100%;
      border:0;
      background:var(--accent);
      color:white;
      border-radius:14px;
      padding:12px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
    }

    .stats {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    .stat {
      border:1px solid var(--line);
      border-radius:15px;
      padding:14px 8px;
      text-align:center;
      background:var(--card);
    }

    .stat-num {
      font-family:"Fraunces", Georgia, serif;
      font-size:24px;
      line-height:1;
      font-weight:600;
      color:var(--accent);
    }

    .stat-label {
      color:var(--muted);
      font-size:12px;
      margin-top:7px;
      font-weight:800;
    }

    .toast {
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:92px;
      background:#25231F;
      color:white;
      border-radius:999px;
      padding:10px 16px;
      font-size:11.5px;
      z-index:30;
      opacity:0;
      pointer-events:none;
      transition:.2s ease;
    }

    .toast.show {
      opacity:1;
    }

    @media (min-width: 680px) {
      .hero {
        border-radius:0 0 24px 24px;
      }
      .content {
        padding-left:22px;
        padding-right:22px;
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="app"></div>
  <div class="toast" id="toast"></div>

  <script>
    // ==================== CONFIG ====================
    const JSONBIN_ID = "6a2a8a2cda38895dfeac7eca";
    const JSONBIN_KEY = "$2a$10$SjTJd3D0tBhLZ5C8s.0Ef.5vCebu0ctZs9Fwhrxkss9DK2YsYbwru";

    // ==================== STATE ====================
    let jobs = [];
    let view = "jobs";
    let openJobId = null;
    let lastRefresh = new Date();

    // ==================== HELPERS ====================
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function pick(obj, fields, fallback = "") {
      for (const field of fields) {
        const value = obj?.[field];
        if (value !== undefined && value !== null && String(value).trim() !== "") return value;
      }
      return fallback;
    }

    function parsePriority(job) {
      const raw = String(pick(job, ["priority", "score", "matchScore", "rating"], "")).toLowerCase();
      const numeric = parseFloat(raw.replace("/10", ""));
      if (raw.includes("high") || (!Number.isNaN(numeric) && numeric >= 8)) return "high";
      if (raw.includes("medium") || raw.includes("med") || (!Number.isNaN(numeric) && numeric >= 6)) return "medium";
      return "low";
    }

    function matchScore(job) {
      const raw = String(pick(job, ["matchScore", "rating", "score"], "")).toLowerCase();
      const numeric = parseFloat(raw.replace("/10", ""));
      if (!Number.isNaN(numeric)) return `${Math.round(numeric)}/10`;
      const priority = parsePriority(job);
      if (priority === "high") return "9/10";
      if (priority === "medium") return "6/10";
      return "4/10";
    }

    function statusText(status) {
      const s = String(status || "to_apply").toLowerCase();
      if (s === "applied") return "Applied";
      if (s === "shortlisted") return "Shortlisted";
      if (s === "interview") return "Interview";
      if (s === "rejected") return "Rejected";
      if (s === "saved") return "To apply";
      return "To apply";
    }

    function normalizeJob(job, index) {
      const priority = parsePriority(job);
      const title = pick(job, ["title", "jobTitle", "name", "role", "position"], "Job Title Not Available");
      const source = pick(job, ["source", "platform"], "");
      const company = pick(job, ["company", "companyName", "organization", "organisation", "employer"], source || "N/A");
      const location = pick(job, ["location", "jobLocation", "city", "place"], "India");
      const url = pick(job, ["url", "link", "jobUrl", "applyUrl", "job_url"], "");
      const reason = pick(job, ["reason", "matchReason", "summary", "snippet"], "");
      const jd = pick(job, ["jd", "description", "jobDescription", "details", "snippet"], reason);
      const dateAdded = pick(job, ["dateAdded", "createdAt", "postedDate", "date"], new Date().toISOString().slice(0, 10));
      const status = pick(job, ["status"], "to_apply");
      const notes = pick(job, ["notes", "myNotes"], "");

      return {
        ...job,
        id: pick(job, ["id", "_id"], `job-${index}-${Date.now()}`),
        title,
        company,
        location,
        url,
        reason,
        jd,
        dateAdded,
        status,
        notes,
        priority,
        scoreLabel: matchScore(job),
      };
    }

    function normalizeJobs(list) {
      const array = Array.isArray(list) ? list : [];
      const seen = new Set();
      return array
        .map(normalizeJob)
        .filter(job => {
          const key = `${job.title.toLowerCase().trim()}|${job.company.toLowerCase().trim()}|${job.location.toLowerCase().trim()}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
    }

    function formatDate(value) {
      const d = value ? new Date(value) : new Date();
      if (Number.isNaN(d.getTime())) return "Today";
      return d.toLocaleDateString("en-IN", { weekday:"short", day:"2-digit", month:"short" });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    // ==================== JSONBIN ====================
    async function loadJobs() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest?meta=false`, {
          headers: { "X-Master-Key": JSONBIN_KEY },
          cache: "no-store",
        });
        if (!res.ok) throw new Error(`JSONBin status ${res.status}`);
        const data = await res.json();
        return normalizeJobs(Array.isArray(data) ? data : (data.jobs || []));
      } catch (e) {
        console.error("Load error:", e);
        showToast("Could not refresh jobs");
        return jobs;
      }
    }

    async function saveJobs() {
      try {
        const payload = {
          jobs,
          lastUpdated: new Date().toISOString(),
        };
        const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
          method: "PUT",
          headers: {
            "X-Master-Key": JSONBIN_KEY,
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(`JSONBin status ${res.status}`);
        return true;
      } catch (e) {
        console.error("Save error:", e);
        showToast("Save failed");
        return false;
      }
    }

    async function init() {
      jobs = await loadJobs();
      openJobId = null;
      render();

      setInterval(async () => {
        const latest = await loadJobs();
        if (latest.length || jobs.length === 0) {
          jobs = latest;
          lastRefresh = new Date();
          render();
        }
      }, 5 * 60 * 1000);
    }

    // ==================== RENDER ====================
    function render() {
      const inProgress = jobs.filter(j => !["applied", "rejected"].includes(String(j.status).toLowerCase())).length;
      document.getElementById("app").innerHTML = `
        <section class="hero">
          <div>
            <h1 class="hero-title">JobPilot</h1>
            <p class="hero-sub">Debojit · Recovery Manager Desk</p>
          </div>
          <div class="progress-box">
            <div class="progress-number">${inProgress}</div>
            <div class="progress-label">IN PROGRESS</div>
          </div>
        </section>

        <section class="toolbar">
          <button class="refresh-btn" onclick="refreshJobs()">↻ Refresh jobs</button>
          <div class="count-text">${jobs.length} jobs</div>
        </section>

        <main class="content">${renderView()}</main>

        <nav class="tabs">
          <button class="tab ${view === "jobs" ? "active" : ""}" onclick="setView('jobs')">
            <span class="tab-icon">▦</span><span>Jobs</span>
          </button>
          <button class="tab ${view === "add" ? "active" : ""}" onclick="setView('add')">
            <span class="tab-icon">＋</span><span>Add</span>
          </button>
          <button class="tab ${view === "tracker" ? "active" : ""}" onclick="setView('tracker')">
            <span class="tab-icon">▥</span><span>Tracker</span>
          </button>
        </nav>
      `;
    }

    function renderView() {
      if (view === "add") return renderAddJob();
      if (view === "tracker") return renderTracker();
      return renderJobsList();
    }

    function renderJobsList() {
      if (!jobs.length) {
        return `<div class="empty">No jobs yet. Check n8n, JSONBin, or add a job manually.</div>`;
      }

      return jobs.map((job, i) => {
        const isOpen = openJobId === i;
        const priClass = job.priority === "high" ? "high" : job.priority === "medium" ? "medium" : "low";
        const priText = job.priority === "high" ? "High match" : job.priority === "medium" ? "Medium match" : "Low match";
        const descId = `desc-${i}`;
        const applyLabel = job.url ? "Apply on LinkedIn" : "Open job";
        const mailSubject = encodeURIComponent(`Regarding ${job.title} role`);
        const mailBody = encodeURIComponent(`Hi,\n\nI am interested in the ${job.title} role at ${job.company}. Please share the next steps.\n\nJob link: ${job.url || "N/A"}`);
        return `
          <article class="card ${priClass}">
            <button class="card-head" onclick="toggleJob(${i})">
              <div class="job-icon">▣</div>
              <div>
                <div class="job-title">${escapeHtml(job.title)}</div>
                <div class="job-company">${escapeHtml(job.company)}</div>
                <div class="job-location">⌖ ${escapeHtml(job.location)}</div>
                <div class="chip-row">
                  <span class="chip chip-status">◷ ${escapeHtml(statusText(job.status))}</span>
                  <span class="chip chip-${job.priority}">${escapeHtml(job.scoreLabel)} · ${priText}</span>
                </div>
                <div class="job-date">${formatDate(job.dateAdded)}</div>
              </div>
              <div class="chevron">${isOpen ? "⌃" : "⌄"}</div>
            </button>

            ${isOpen ? `
              <div class="card-body">
                <p class="quote">“${escapeHtml(job.reason || job.jd || "Review the job details and apply if suitable.")}”</p>

                <p class="label">Status</p>
                <select class="status-select" onchange="changeStatus(${i}, this.value)">
                  ${["to_apply","applied","shortlisted","interview","rejected"].map(s => `
                    <option value="${s}" ${String(job.status).toLowerCase() === s ? "selected" : ""}>${statusText(s)}</option>
                  `).join("")}
                </select>

                <div class="actions">
                  <a class="action" href="${escapeHtml(job.url || "#")}" target="_blank" rel="noopener">↗ ${applyLabel}</a>
                  <a class="action" href="mailto:?subject=${mailSubject}&body=${mailBody}">✉ Email HR</a>
                </div>

                <p class="hint">Documents are written automatically when the workflow runs. Tap Refresh after the next run.</p>

                <button class="link-btn" onclick="toggleDescription('${descId}')">Show job description</button>
                <div class="description" id="${descId}">${escapeHtml(job.jd || job.reason || "No job description available.")}</div>

                <p class="label">My notes</p>
                <textarea class="notes" placeholder="Add personal notes..." oninput="updateNotes(${i}, this.value)">${escapeHtml(job.notes || "")}</textarea>

                <button class="remove-btn" onclick="deleteJob(${i})">🗑 Remove job</button>
              </div>
            ` : ""}
          </article>
        `;
      }).join("");
    }

    function renderAddJob() {
      return `
        <h2 class="page-title">Add Job</h2>
        <section class="form-card">
          <div class="field">
            <label>Job Title *</label>
            <input id="title" type="text" placeholder="Recovery Manager" />
          </div>
          <div class="field">
            <label>Company *</label>
            <input id="company" type="text" placeholder="Company name" />
          </div>
          <div class="field">
            <label>Location</label>
            <input id="location" type="text" placeholder="Kolkata, West Bengal" />
          </div>
          <div class="field">
            <label>Job URL</label>
            <input id="url" type="url" placeholder="https://..." />
          </div>
          <div class="field">
            <label>Job Description / Notes *</label>
            <textarea id="jd" rows="6" placeholder="Paste job description..."></textarea>
          </div>
          <button class="save-btn" onclick="addJob()">Save Job</button>
        </section>
      `;
    }

    function renderTracker() {
      const applied = jobs.filter(j => String(j.status).toLowerCase() === "applied").length;
      const shortlisted = jobs.filter(j => String(j.status).toLowerCase() === "shortlisted").length;
      const pending = jobs.filter(j => !["applied","rejected"].includes(String(j.status).toLowerCase())).length;
      return `
        <h2 class="page-title">Tracker</h2>
        <div class="stats">
          <div class="stat"><div class="stat-num">${jobs.length}</div><div class="stat-label">Total</div></div>
          <div class="stat"><div class="stat-num">${pending}</div><div class="stat-label">In Progress</div></div>
          <div class="stat"><div class="stat-num">${applied}</div><div class="stat-label">Applied</div></div>
        </div>

        <section class="tracker-card" style="margin-top:10px;">
          <p class="label">Shortlisted / Interview</p>
          ${jobs.filter(j => ["shortlisted","interview"].includes(String(j.status).toLowerCase())).length === 0
            ? `<div style="color:var(--muted);font-size:14px;">No shortlisted jobs yet.</div>`
            : jobs.filter(j => ["shortlisted","interview"].includes(String(j.status).toLowerCase())).map(j => `
                <div style="border-bottom:1px solid var(--line);padding:11px 0;">
                  <strong>${escapeHtml(j.title)}</strong><br>
                  <span style="color:var(--muted);font-size:11.5px;">${escapeHtml(j.company)} · ${escapeHtml(j.location)}</span>
                </div>
              `).join("")}
        </section>

        <section class="tracker-card">
          <p class="label">Applied</p>
          ${applied === 0
            ? `<div style="color:var(--muted);font-size:14px;">Mark jobs as Applied to track progress.</div>`
            : jobs.filter(j => String(j.status).toLowerCase() === "applied").map(j => `
                <div style="border-bottom:1px solid var(--line);padding:11px 0;">
                  <strong>${escapeHtml(j.title)}</strong><br>
                  <span style="color:var(--muted);font-size:11.5px;">${escapeHtml(j.company)} · ${escapeHtml(j.location)}</span>
                </div>
              `).join("")}
        </section>
      `;
    }

    // ==================== ACTIONS ====================
    function setView(next) {
      view = next;
      render();
    }

    function toggleJob(index) {
      openJobId = openJobId === index ? null : index;
      render();
    }

    function toggleDescription(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle("open");
    }

    async function changeStatus(index, status) {
      jobs[index].status = status;
      if (status === "applied") jobs[index].dateApplied = new Date().toISOString().slice(0, 10);
      await saveJobs();
      render();
      showToast("Status updated");
    }

    let noteTimer = null;
    function updateNotes(index, value) {
      jobs[index].notes = value;
      clearTimeout(noteTimer);
      noteTimer = setTimeout(async () => {
        await saveJobs();
        showToast("Notes saved");
      }, 700);
    }

    async function deleteJob(index) {
      if (!confirm("Remove this job?")) return;
      jobs.splice(index, 1);
      openJobId = null;
      await saveJobs();
      render();
      showToast("Job removed");
    }

    async function addJob() {
      const title = document.getElementById("title").value.trim();
      const company = document.getElementById("company").value.trim();
      const location = document.getElementById("location").value.trim() || "India";
      const url = document.getElementById("url").value.trim();
      const jd = document.getElementById("jd").value.trim();

      if (!title || !company || !jd) {
        alert("Please fill Job Title, Company and Description.");
        return;
      }

      jobs.unshift(normalizeJob({
        id:`manual-${Date.now()}`,
        title,
        company,
        location,
        url,
        jd,
        reason:"Manual entry",
        score:"MEDIUM",
        status:"to_apply",
        dateAdded:new Date().toISOString().slice(0, 10),
      }, 0));

      await saveJobs();
      view = "jobs";
      openJobId = null;
      lastRefresh = new Date();
      render();
      showToast("Job added");
    }

    async function refreshJobs() {
      const latest = await loadJobs();
      jobs = latest;
      lastRefresh = new Date();
      openJobId = null;
      render();
      showToast("Jobs refreshed");
    }

    init();
  </script>
</body>
</html>
